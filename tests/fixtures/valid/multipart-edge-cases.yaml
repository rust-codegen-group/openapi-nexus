openapi: 3.1.0
info:
  title: Multipart Edge Cases
  version: 1.0.0
  description: Covers optional multipart bodies, optional parts, and text-only multipart fields.
paths:
  /multipart/optional:
    post:
      tags:
        - multipart
      operationId: send_optional_parts
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OptionalUpload'
      responses:
        '204':
          description: Accepted
  /multipart/text-only:
    post:
      tags:
        - multipart
      operationId: send_text_fields
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TextFields'
      responses:
        '204':
          description: Accepted
components:
  schemas:
    OptionalUpload:
      type: object
      properties:
        file:
          type: string
          format: binary
        title:
          type: string
        retry_count:
          type: integer
        enabled:
          type: boolean
        attributes:
          $ref: '#/components/schemas/Attributes'
    TextFields:
      type: object
      required:
        - note
        - retry_count
        - enabled
      properties:
        note:
          type: string
        retry_count:
          type: integer
        enabled:
          type: boolean
    Attributes:
      type: object
      required:
        - label
      properties:
        label:
          type: string
        priority:
          type: integer
