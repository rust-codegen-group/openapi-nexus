openapi: 3.1.0
info:
  title: Discriminated Union Mixed Unit and allOf Test
  description: |
    Test fixture for internally tagged discriminated union where the "unspecified"
    variant is a plain object with only the discriminator field, while other variants
    use allOf to merge a $ref with a discriminator object.

    This pattern is generated by serde's `#[serde(tag = "kind")]` when one variant
    is a unit variant (no fields) and others carry data from referenced schemas.
  version: 1.0.0

paths:
  /resource:
    post:
      summary: Create resource
      operationId: create_resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Setup'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Setup'

components:
  schemas:
    SetupQuick:
      type: object
      properties:
        name:
          type: string
          description: Unique identifier for the setup.
        engine:
          type: string
          description: Inference engine name.
      required:
        - name
        - engine

    SetupCustom:
      type: object
      properties:
        image:
          type: string
          description: Container image path.
      required:
        - image

    Setup:
      oneOf:
        - type: object
          required:
            - kind
          properties:
            kind:
              type: string
              enum:
                - SETUP_UNSPECIFIED
        - allOf:
            - $ref: '#/components/schemas/SetupQuick'
            - type: object
              required:
                - kind
              properties:
                kind:
                  type: string
                  enum:
                    - SETUP_QUICK
        - allOf:
            - $ref: '#/components/schemas/SetupCustom'
            - type: object
              required:
                - kind
              properties:
                kind:
                  type: string
                  enum:
                    - SETUP_CUSTOM
      description: 'Setup: quick (managed), custom, or unspecified.'
