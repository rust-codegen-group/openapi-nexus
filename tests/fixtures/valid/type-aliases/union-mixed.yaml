openapi: 3.1.0
info:
  title: Union Type with Mixed Members Test
  description: Test fixture for union types with both interfaces and primitives
  version: 1.0.0

paths:
  /test:
    post:
      summary: Test endpoint with mixed union type
      operationId: test_mixed_union
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Foo'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Foo'

components:
  schemas:
    Bar:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name

    Foo:
      oneOf:
        - $ref: '#/components/schemas/Bar'
        - type: string
        - type: number

