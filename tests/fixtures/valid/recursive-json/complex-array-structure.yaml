openapi: 3.1.0
info:
  title: Complex Array Structure Test
  description: Test case for array of inline objects where each object has nested inline objects
  version: 1.0.0

paths:
  /test:
    get:
      summary: Test endpoint
      operationId: test
      responses:
        '200':
          description: OK

components:
  schemas:
    ComplexArrayStructure:
      type: object
      description: Array of inline objects with nested inline objects and arrays
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              item_id:
                type: string
              nested_data:
                type: object
                properties:
                  nested_field_one:
                    type: string
                  nested_field_two:
                    type: integer
              metadata:
                type: object
                properties:
                  created_at:
                    type: string
                  tags:
                    type: array
                    items:
                      type: string
            required:
              - item_id
      required:
        - items

