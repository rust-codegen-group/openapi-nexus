openapi: 3.1.0
info:
  title: Inline Object with Array Test
  description: Test case for inline object containing an array of inline objects
  version: 1.0.0

paths:
  /test:
    get:
      summary: Test endpoint
      operationId: test
      responses:
        '200':
          description: OK

components:
  schemas:
    InlineObjectWithArray:
      type: object
      description: Inline object containing array of inline objects
      properties:
        container_data:
          type: object
          required:
            - container_id
          properties:
            container_id:
              type: string
            items:
              type: array
              items:
                type: object
                properties:
                  item_name:
                    type: string
                  item_value:
                    type: number
      required:
        - container_data

