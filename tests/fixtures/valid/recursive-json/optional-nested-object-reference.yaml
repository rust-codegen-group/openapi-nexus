openapi: 3.1.0
info:
  title: Optional Nested Object Reference Test
  description: Test case for optional nested object reference
  version: 1.0.0

paths:
  /test:
    get:
      summary: Test endpoint
      operationId: test
      responses:
        '200':
          description: OK

components:
  schemas:
    UserProfile:
      type: object
      description: User profile model with snake_case properties
      properties:
        profile_id:
          type: string
        display_name:
          type: string
        bio_text:
          type: string
      required:
        - profile_id

    UserWithOptionalProfile:
      type: object
      description: User with optional nested profile reference
      properties:
        user_id:
          type: string
        optional_profile:
          $ref: '#/components/schemas/UserProfile'
      required:
        - user_id

