name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

defaults:
  run:
    shell: bash

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo doc --workspace --no-deps

  mdbook:
    name: mdbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
      - run: cargo install mdbook-mermaid-mmdr
      - run: mdbook build doc

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace
      - run: cargo test --doc --workspace

  golden-build:
    name: Golden Build (${{ matrix.generator }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - generator: typescript-fetch
            cmd: just golden::build-ts
          - generator: go-http
            cmd: just golden::build-go
          - generator: rust-reqwest
            cmd: just golden::build-rust-reqwest
          - generator: rust-ureq
            cmd: just golden::build-rust-ureq
          - generator: rust-aioduct
            cmd: just golden::build-rust-aioduct
          - generator: python-httpx
            cmd: just golden::build-python
          - generator: python-requests
            cmd: just golden::build-python-requests
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        if: contains(matrix.generator, 'rust-')
      - uses: actions/setup-node@v6
        if: matrix.generator == 'typescript-fetch'
        with:
          node-version: '20'
      - if: matrix.generator == 'typescript-fetch'
        run: npm install -g typescript
      - uses: actions/setup-go@v6
        if: matrix.generator == 'go-http'
        with:
          go-version: 'stable'
      - uses: actions/setup-python@v5
        if: contains(matrix.generator, 'python-')
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v6
        if: contains(matrix.generator, 'python-')
        with:
          node-version: '20'
      - run: ${{ matrix.cmd }}

  basics:
    name: Basics
    runs-on: ubuntu-latest
    needs: [fmt, clippy, doc, mdbook, test, golden-build]
    steps:
      - run: exit 0

  release:
    name: Release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [basics]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: openapi-nexus-linux-x86_64-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: openapi-nexus-linux-aarch64-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: openapi-nexus-linux-x86_64-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: openapi-nexus-linux-aarch64-musl
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: openapi-nexus-macos-aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Build release binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          toolchain: "1.90"
          args: "--release --bin openapi-nexus"

      - name: Prepare artifact
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            chmod +x target/${{ matrix.target }}/release/openapi-nexus
          fi
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/openapi-nexus artifacts/${{ matrix.artifact_name }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.artifact_name }}
          retention-days: 3
