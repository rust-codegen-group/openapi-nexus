name: CI

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: openapi-nexus-linux-x86_64-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: openapi-nexus-linux-aarch64-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: openapi-nexus-linux-x86_64-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: openapi-nexus-linux-aarch64-musl
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: openapi-nexus-macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run clippy
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: clippy
          target: ${{ matrix.target }}
          toolchain: 1.90
          args: "--all-targets -- -D warnings"

      - name: Run tests
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: test
          target: ${{ matrix.target }}
          toolchain: 1.90
          args: "--workspace"

      - name: Build release binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          toolchain: 1.90
          args: "--release --bin openapi-nexus"

      - name: Prepare artifact
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            chmod +x target/${{ matrix.target }}/release/openapi-nexus
          fi
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/openapi-nexus artifacts/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.artifact_name }}
          retention-days: 3
